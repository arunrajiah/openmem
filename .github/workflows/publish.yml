name: Publish

# Triggered when a version tag is pushed: git tag v1.2.3 && git push --tags
on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write   # needed to create GitHub Releases

jobs:
  publish:
    name: Build & publish to Chrome Web Store
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Derive semver from tag (strips leading "v") ────────────────────────
      - name: Extract version
        id: ver
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          echo "tag=$TAG"         >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=openmem-extension-${VERSION}.zip" >> "$GITHUB_OUTPUT"

      # ── Stamp version into manifest.json and all package.json files ────────
      - name: Stamp version ${{ steps.ver.outputs.version }}
        run: node scripts/bump-version.mjs ${{ steps.ver.outputs.version }}

      # ── Build in dependency order ──────────────────────────────────────────
      - name: Build @openmem/shared
        run: pnpm --filter @openmem/shared build

      - name: Build web UI
        run: pnpm --filter @openmem/web build

      - name: Build companion
        run: pnpm --filter @openmem/companion build

      - name: Build extension
        run: pnpm --filter @openmem/extension build

      # ── Package extension as a ZIP ─────────────────────────────────────────
      - name: Create extension ZIP
        run: |
          cd packages/extension/dist
          zip -r "../../../${{ steps.ver.outputs.zip }}" .
          cd -
          echo "ZIP contents:"
          unzip -l "${{ steps.ver.outputs.zip }}"

      # ── Upload to Chrome Web Store (upload only, submit for review below) ──
      - name: Upload to Chrome Web Store
        id: cws_upload
        run: |
          npx --yes chrome-webstore-upload-cli@3 upload \
            --source "${{ steps.ver.outputs.zip }}" \
            --extension-id "${{ secrets.CHROME_EXTENSION_ID }}" \
            --client-id "${{ secrets.CHROME_CLIENT_ID }}" \
            --client-secret "${{ secrets.CHROME_CLIENT_SECRET }}" \
            --refresh-token "${{ secrets.CHROME_REFRESH_TOKEN }}"
        env:
          CI: true

      # ── Submit the uploaded draft for review ───────────────────────────────
      - name: Publish to Chrome Web Store
        run: |
          npx --yes chrome-webstore-upload-cli@3 publish \
            --extension-id "${{ secrets.CHROME_EXTENSION_ID }}" \
            --client-id "${{ secrets.CHROME_CLIENT_ID }}" \
            --client-secret "${{ secrets.CHROME_CLIENT_SECRET }}" \
            --refresh-token "${{ secrets.CHROME_REFRESH_TOKEN }}"
        env:
          CI: true

      # ── Create a GitHub Release with the ZIP attached ──────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "OpenMem ${{ steps.ver.outputs.tag }}"
          body: |
            ## Installation

            ### Option A — Chrome Web Store (recommended)
            The extension has been submitted for review. Once approved it will
            be available at the Chrome Web Store link in the README.

            ### Option B — Load unpacked (available immediately)
            1. Download `${{ steps.ver.outputs.zip }}` below
            2. Unzip it
            3. Open `chrome://extensions` → enable **Developer mode**
            4. Click **Load unpacked** → select the unzipped folder

            ---
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for what changed in this release.
          files: ${{ steps.ver.outputs.zip }}
          generate_release_notes: true
